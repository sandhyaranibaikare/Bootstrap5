<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap cards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
</head>

<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <img src="/Bootstrap card/images/kurti.png" class="card-img-top" alt="Placeholder Image" />
                    <div class="card-body bg-dark text-light">
                        <h5 class="card-title">Kurti Set</h5>
                        <p class="card-text">
                            Premium Cotton Printed Kurti with Pant & Dupatta
                        </p>
                        <button type="button" class="btn btn-primary">Buy Now</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <img src="/Bootstrap card/images/lehenga1.jpg" class="card-img-top" alt="Placeholder Image" />
                    <div class="card-body bg-dark text-light">
                        <h5 class="card-title">Daffodil Yellow Lehenga</h5>
                        <p class="card-text">
                            Premium Printed Lehenga with jacket & Dupatta.
                        </p>
                        <button type="button" class="btn btn-primary">Buy Now</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <img src="/Bootstrap card/images/top1.jpg" class="card-img-top" alt="Placeholder Image" />
                    <div class="card-body bg-dark text-light">
                        <h5 class="card-title">Top</h5>
                        <p class="card-text">
                            Premium Cotton Printed Top with Pant.
                        </p>
                        <button type="button" class="btn btn-primary">Buy Now</button>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
